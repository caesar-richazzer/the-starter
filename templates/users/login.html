{% extends 'base.html' %}

{% block content %}
<style>
    /* LOCK VIEWPORT - NO SCROLLING */
    html, body {
        height: 100%;
        overflow: hidden;
    }

    .auth-wrapper {
        height: 80vh; /* Fits within the base.html main area */
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .glass-card {
        background: rgba(255, 255, 255, 0.25);
        backdrop-filter: blur(40px);
        -webkit-backdrop-filter: blur(40px);
        border: 2px solid rgba(255, 255, 255, 0.7);
        border-radius: 40px;
        padding: 45px;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 30px 60px rgba(186, 230, 253, 0.3);
        text-align: center;
    }

    .crystal-title {
        font-family: 'Merriweather', serif;
        background: linear-gradient(180deg, #1e40af 0%, #3b82f6 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-size: 2rem;
        font-weight: 800;
        margin-bottom: 30px;
        letter-spacing: -1px;
    }

    /* SHINING INPUTS */
    input[type="text"], input[type="password"], input[type="email"], input[type="username"] {
        width: 100%;
        padding: 14px 25px;
        margin-bottom: 15px;
        background: rgba(255, 255, 255, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.8);
        border-radius: 100px;
        font-family: 'Inter', sans-serif;
        color: #1e3a8a;
        outline: none;
        box-sizing: border-box;
    }

    input:focus { border-color: #3b82f6; background: rgba(255, 255, 255, 0.8); }

    label {
        display: block; text-align: left; padding-left: 20px;
        font-weight: 800; font-size: 0.75rem; color: #1e40af;
        text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px;
    }

    /* CHROME BUTTON */
    .btn-chrome {
        width: 100%;
        padding: 16px;
        background: linear-gradient(180deg, #ffffff 0%, #dbeafe 100%);
        color: #1e40af !important;
        border: 1px solid #fff;
        border-radius: 100px;
        font-weight: 800;
        font-size: 1.1rem;
        cursor: pointer;
        box-shadow: 0 10px 20px rgba(37, 99, 235, 0.1), inset 0 2px 2px white;
        margin-top: 10px;
    }

    .auth-footer { margin-top: 25px; font-size: 0.9rem; color: #64748b; }
    .auth-footer a { color: #2563eb; text-decoration: none; font-weight: 700; }
    
    /* Remove Django's p tag margins */
    .form-content p { margin: 0; }
</style>

<div class="auth-wrapper">
    <div class="glass-card">
        <h2 class="crystal-title">Login to Sokoni</h2>
        <form method="POST">
            {% csrf_token %}
            <div class="form-content">
                {{ form.as_p }}
            </div>
            <button type="submit" class="btn-chrome">Sign In</button>
        </form>
        <div class="auth-footer">
            Don't have an account? <a href="{% url 'register' %}">Join Now</a>
        </div>
    </div>
</div>
{% endblock %}
